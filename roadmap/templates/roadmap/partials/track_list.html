{% for track in tracks %}
<div class="col">
    <div class="card h-100">
        <div class="card-body d-flex flex-column">
            <h3 class="card-title">{{ track.name }}</h3>
            <p class="card-text flex-grow-1">{{ track.description|truncatechars:150 }}</p>
            <div class="mt-2">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="badge" style="background-color: #2d2d2d;">
                        {% if track.track_type == 'PROFESSIONAL' %}
                            Profesionalizante
                        {% else %}
                            Flexible
                        {% endif %}
                    </span>
                    <span class="text-secondary">{{ track.credits_required }} créditos</span>
                </div>
                <a href="{% url 'track_detail' track.pk %}" class="btn btn-primary w-100">
                    Explorar trayectoria <i class="fas fa-arrow-right ms-2"></i>
                </a>
            </div>
        </div>
    </div>
</div>
{% empty %}
<p class="text-secondary text-center py-5">No se encontraron trayectorias.</p>
{% endfor %}
