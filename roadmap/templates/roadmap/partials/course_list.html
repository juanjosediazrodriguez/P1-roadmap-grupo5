{% for course in courses %}
<!-- Modal -->
{% include "roadmap/partials/course_modal.html" with course=course %}

<!-- Tarjeta del curso -->
<div class="col">
    <div class="card h-100" data-bs-toggle="modal" data-bs-target="#courseModal{{ course.id }}" style="cursor:pointer;">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-start mb-2">
                <span class="badge" style="background-color: #2d2d2d;">Semestre {{ course.semester_suggested }}</span>
                <span class="text-secondary">{{ course.credits }} créditos</span>
            </div>
            <h5 class="card-title mt-3">{{ course.name }}</h5>
            <p class="card-text">{{ course.code }}</p>
        </div>
    </div>
</div>
{% empty %}
<p class="text-secondary text-center py-5">No se encontraron cursos.</p>
{% endfor %}
