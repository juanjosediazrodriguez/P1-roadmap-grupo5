{% for spec in specializations %}
<div class="col">
    <div class="card h-100">
        <div class="card-body d-flex flex-column">
            <h3 class="card-title">{{ spec.name }}</h3>
            <p class="card-text flex-grow-1">{{ spec.description|truncatechars:150 }}</p>
            <div class="mt-2">
                <a href="{% url 'specialization_detail' spec.pk %}" class="btn btn-primary w-100">
                    Explorar ruta <i class="fas fa-arrow-right ms-2"></i>
                </a>
            </div>
        </div>
    </div>
</div>
{% empty %}
<p class="text-secondary text-center py-5">No se encontraron especializaciones.</p>
{% endfor %}
