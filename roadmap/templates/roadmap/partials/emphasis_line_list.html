{% for line in emphasis_lines %}
<div class="col">
    <div class="card h-100">
        <div class="card-body d-flex flex-column">
            <h3 class="card-title">{{ line.name }}</h3>
            <p class="card-text flex-grow-1">{{ line.description|truncatechars:150 }}</p>
            <div class="mt-2">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <span class="badge" style="background-color: #2d2d2d;">
                        {{ line.credits_required }} créditos
                    </span>
                    {% if line.specialization %}
                    <span class="badge" style="background-color: #1e3a5f;">
                        <i class="fas fa-link me-1"></i>Conduce a especialización
                    </span>
                    {% endif %}
                </div>
                <a href="{% url 'emphasis_line_detail' line.pk %}" class="btn btn-primary w-100">
                    Explorar línea <i class="fas fa-arrow-right ms-2"></i>
                </a>
            </div>
        </div>
    </div>
</div>
{% empty %}
<p class="text-secondary text-center py-5">No se encontraron líneas de énfasis.</p>
{% endfor %}
